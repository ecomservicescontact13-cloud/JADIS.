function CommunauteSection() {
  const [posts, setPosts] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("communautePosts") || "null");
      if (saved && Array.isArray(saved) && saved.length > 0) return saved;
    } catch {}
    return SEED_POSTS;
  });

  const [filter, setFilter] = useState("tous");
  const [showForm, setShowForm] = useState(false);
  const [newPost, setNewPost] = useState({ author: "", title: "", content: "", category: "progres" });
  const [replyInputs, setReplyInputs] = useState({});
  const [activeReply, setActiveReply] = useState(null);

  const categories = [
    { id: "tous", label: "Tous" },
    { id: "progres", label: "Progrès" },
    { id: "obstacle", label: "Obstacles" },
    { id: "question", label: "Questions" },
    { id: "partage", label: "Partages" },
  ];

  const categoryMeta = {
    progres:  { label: "Progrès",  bg: COLORS.tealPale,                      text: COLORS.teal },
    obstacle: { label: "Obstacle", bg: "rgba(239,68,68,0.08)",               text: "#DC2626" },
    question: { label: "Question", bg: "rgba(196,163,90,0.12)",              text: COLORS.gold },
    partage:  { label: "Partage",  bg: "rgba(99,102,241,0.08)",              text: "#6366F1" },
  };

  const savePosts = (updated) => {
    setPosts(updated);
    localStorage.setItem("communautePosts", JSON.stringify(updated));
  };

  const handleLike = (postId) => {
    savePosts(
      posts.map((p) =>
        p.id !== postId
          ? p
          : { ...p, likes: p.likedByMe ? p.likes - 1 : p.likes + 1, likedByMe: !p.likedByMe }
      )
    );
  };

  const handleLikeReply = (postId, replyId) => {
    savePosts(
      posts.map((p) =>
        p.id !== postId
          ? p
          : {
              ...p,
              replies: p.replies.map((r) =>
                r.id !== replyId
                  ? r
                  : { ...r, likes: r.likedByMe ? r.likes - 1 : r.likes + 1, likedByMe: !r.likedByMe }
              ),
            }
      )
    );
  };

  const handleSubmitPost = () => {
    if (!newPost.author.trim() || !newPost.title.trim() || !newPost.content.trim()) return;
    const post = {
      id: Date.now(),
      author: newPost.author.trim(),
      avatar: newPost.author.trim()[0].toUpperCase(),
      category: newPost.category,
      title: newPost.title.trim(),
      content: newPost.content.trim(),
      likes: 0,
      likedByMe: false,
      replies: [],
      timestamp: Date.now(),
    };
    savePosts([post, ...posts]);
    setNewPost({ author: "", title: "", content: "", category: "progres" });
    setShowForm(false);
  };

  const handleSubmitReply = (postId) => {
    const input = replyInputs[postId] || {};
    if (!input.author?.trim() || !input.content?.trim()) return;
    const reply = {
      id: Date.now(),
      author: input.author.trim(),
      avatar: input.author.trim()[0].toUpperCase(),
      content: input.content.trim(),
      likes: 0,
      likedByMe: false,
    };
    savePosts(
      posts.map((p) => (p.id === postId ? { ...p, replies: [...p.replies, reply] } : p))
    );
    setReplyInputs((prev) => ({ ...prev, [postId]: {} }));
    setActiveReply(null);
  };

  const formatTime = (ts) => {
    const diff = Date.now() - ts;
    const h = Math.floor(diff / 3600000);
    if (h < 1) return "à l'instant";
    if (h < 24) return `il y a ${h}h`;
    const d = Math.floor(h / 24);
    return d === 1 ? "hier" : `il y a ${d}j`;
  };

  const filtered = filter === "tous" ? posts : posts.filter((p) => p.category === filter);

  return (
    <div className="section-content fade-in">
      {/* En-tête */}
      <div style={{ textAlign: "center", marginBottom: "2.5rem", paddingTop: "0.5rem" }}>
        <h2 className="heading-display" style={{ fontSize: "2rem", marginBottom: "0.6rem" }}>
          Communauté
        </h2>
        <p style={{ color: COLORS.gray, fontSize: "1rem", maxWidth: 520, margin: "0 auto", lineHeight: 1.7 }}>
          Un espace entre frères et sœurs pour partager vos avancées, vos obstacles et vos questions — en toute sincérité.
        </p>
        <div
          style={{
            width: 60, height: 3, margin: "1.2rem auto 0", borderRadius: 2,
            background: `linear-gradient(90deg, ${COLORS.teal}, ${COLORS.gold})`,
          }}
        />
      </div>

      {/* Filtres + bouton nouveau post */}
      <div
        style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          marginBottom: "1.5rem", flexWrap: "wrap", gap: "0.8rem",
        }}
      >
        <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap" }}>
          {categories.map((cat) => (
            <button
              key={cat.id}
              onClick={() => setFilter(cat.id)}
              style={{
                padding: "0.4rem 0.85rem", borderRadius: 20,
                border: `1px solid ${filter === cat.id ? COLORS.teal : "rgba(0,0,0,0.1)"}`,
                background: filter === cat.id ? COLORS.teal : "transparent",
                color: filter === cat.id ? COLORS.white : COLORS.gray,
                fontSize: "0.82rem", fontWeight: 600, cursor: "pointer",
                fontFamily: "'Source Sans 3', sans-serif", transition: "all 0.2s",
              }}
            >
              {cat.label}
            </button>
          ))}
        </div>
        <button
          onClick={() => setShowForm(!showForm)}
          style={{
            padding: "0.5rem 1.2rem", borderRadius: 10, border: "none",
            background: `linear-gradient(135deg, ${COLORS.teal}, ${COLORS.tealLight})`,
            color: COLORS.white, fontWeight: 700, fontSize: "0.88rem",
            fontFamily: "'Source Sans 3', sans-serif", cursor: "pointer",
            boxShadow: "0 2px 8px rgba(27,107,95,0.2)",
          }}
        >
          + Nouveau post
        </button>
      </div>

      {/* Formulaire nouveau post */}
      {showForm && (
        <div
          style={{
            background: COLORS.white, border: `1px solid rgba(27,107,95,0.15)`,
            borderRadius: 16, padding: "1.5rem", marginBottom: "1.5rem",
            boxShadow: "0 4px 20px rgba(27,107,95,0.06)",
          }}
        >
          <div
            style={{
              fontFamily: "'Playfair Display', serif", fontWeight: 600,
              color: COLORS.teal, marginBottom: "1rem", fontSize: "1.1rem",
            }}
          >
            Partager avec la communauté
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.8rem", marginBottom: "0.8rem" }}>
            <input
              placeholder="Ton prénom"
              value={newPost.author}
              onChange={(e) => setNewPost((p) => ({ ...p, author: e.target.value }))}
              style={communauteInputStyle}
            />
            <select
              value={newPost.category}
              onChange={(e) => setNewPost((p) => ({ ...p, category: e.target.value }))}
              style={communauteInputStyle}
            >
              <option value="progres">Progrès</option>
              <option value="obstacle">Obstacle</option>
              <option value="question">Question</option>
              <option value="partage">Partage</option>
            </select>
          </div>
          <input
            placeholder="Titre de ton message"
            value={newPost.title}
            onChange={(e) => setNewPost((p) => ({ ...p, title: e.target.value }))}
            style={{ ...communauteInputStyle, marginBottom: "0.8rem" }}
          />
          <textarea
            placeholder="Exprime-toi librement..."
            value={newPost.content}
            onChange={(e) => setNewPost((p) => ({ ...p, content: e.target.value }))}
            rows={4}
            style={{ ...communauteInputStyle, resize: "vertical" }}
          />
          <div style={{ display: "flex", gap: "0.7rem", marginTop: "1rem" }}>
            <button
              onClick={handleSubmitPost}
              style={{
                padding: "0.6rem 1.4rem", borderRadius: 10, border: "none",
                background: COLORS.teal, color: COLORS.white,
                fontWeight: 700, fontSize: "0.88rem", cursor: "pointer",
                fontFamily: "'Source Sans 3', sans-serif",
              }}
            >
              Publier
            </button>
            <button
              onClick={() => setShowForm(false)}
              style={{
                padding: "0.6rem 1.4rem", borderRadius: 10,
                border: "1px solid rgba(0,0,0,0.1)", background: "transparent",
                color: COLORS.gray, fontSize: "0.88rem", cursor: "pointer",
                fontFamily: "'Source Sans 3', sans-serif",
              }}
            >
              Annuler
            </button>
          </div>
        </div>
      )}

      {/* Liste des posts */}
      <div style={{ display: "flex", flexDirection: "column", gap: "1rem" }}>
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: "3rem", color: COLORS.grayLight, fontStyle: "italic" }}>
            Aucun post dans cette catégorie pour l'instant.
          </div>
        )}
        {filtered.map((post) => {
          const meta = categoryMeta[post.category] || categoryMeta.partage;
          return (
            <div
              key={post.id}
              style={{
                background: COLORS.white, border: "1px solid rgba(0,0,0,0.06)",
                borderRadius: 16, padding: "1.4rem 1.5rem",
                boxShadow: "0 2px 12px rgba(0,0,0,0.03)",
              }}
            >
              {/* En-tête du post */}
              <div style={{ display: "flex", alignItems: "flex-start", gap: "0.9rem", marginBottom: "0.8rem" }}>
                <div
                  style={{
                    width: 42, height: 42, borderRadius: "50%", flexShrink: 0,
                    background: `linear-gradient(135deg, ${COLORS.teal}, ${COLORS.tealLight})`,
                    color: COLORS.white, display: "flex", alignItems: "center",
                    justifyContent: "center", fontWeight: 700, fontSize: "1rem",
                  }}
                >
                  {post.avatar}
                </div>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: "0.6rem", flexWrap: "wrap" }}>
                    <span style={{ fontWeight: 700, fontSize: "0.95rem", color: COLORS.dark }}>
                      {post.author}
                    </span>
                    <span
                      style={{
                        padding: "0.15rem 0.6rem", borderRadius: 20,
                        background: meta.bg, color: meta.text,
                        fontSize: "0.72rem", fontWeight: 700,
                        textTransform: "uppercase", letterSpacing: "0.05em",
                      }}
                    >
                      {meta.label}
                    </span>
                    <span style={{ fontSize: "0.78rem", color: COLORS.grayLight, marginLeft: "auto" }}>
                      {formatTime(post.timestamp)}
                    </span>
                  </div>
                  <div
                    style={{
                      fontFamily: "'Playfair Display', serif", fontWeight: 600,
                      fontSize: "1.05rem", color: COLORS.dark, marginTop: "0.3rem",
                    }}
                  >
                    {post.title}
                  </div>
                </div>
              </div>

              {/* Contenu */}
              <p style={{ fontSize: "0.95rem", lineHeight: 1.75, color: COLORS.darkSoft, marginBottom: "1rem" }}>
                {post.content}
              </p>

              {/* Actions */}
              <div
                style={{
                  display: "flex", gap: "1.2rem", alignItems: "center",
                  paddingTop: "0.8rem", borderTop: "1px solid rgba(0,0,0,0.04)",
                }}
              >
                <button
                  onClick={() => handleLike(post.id)}
                  style={{
                    display: "flex", alignItems: "center", gap: "0.4rem",
                    background: "none", border: "none", cursor: "pointer",
                    color: post.likedByMe ? COLORS.teal : COLORS.grayLight,
                    fontWeight: post.likedByMe ? 700 : 400, fontSize: "0.88rem",
                    fontFamily: "'Source Sans 3', sans-serif", transition: "all 0.2s",
                  }}
                >
                  <svg width="14" height="13" viewBox="0 0 14 13" fill={post.likedByMe ? "currentColor" : "none"} stroke="currentColor" strokeWidth="1.4">
                    <path d="M7 11.5C7 11.5 1 8 1 4.2A3 3 0 0 1 7 3a3 3 0 0 1 6 1.2C13 8 7 11.5 7 11.5Z" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                  {post.likes}
                </button>
                <button
                  onClick={() => setActiveReply(activeReply === post.id ? null : post.id)}
                  style={{
                    display: "flex", alignItems: "center", gap: "0.4rem",
                    background: "none", border: "none", cursor: "pointer",
                    color: activeReply === post.id ? COLORS.teal : COLORS.gray,
                    fontSize: "0.88rem", fontFamily: "'Source Sans 3', sans-serif",
                    fontWeight: activeReply === post.id ? 600 : 400,
                  }}
                >
                  ↩ {post.replies.length} réponse{post.replies.length !== 1 ? "s" : ""}
                </button>
              </div>

              {/* Réponses existantes */}
              {post.replies.length > 0 && (
                <div
                  style={{
                    marginTop: "1rem", paddingLeft: "1.2rem",
                    borderLeft: `2px solid rgba(27,107,95,0.12)`,
                  }}
                >
                  {post.replies.map((reply) => (
                    <div
                      key={reply.id}
                      style={{
                        marginBottom: "0.7rem", padding: "0.8rem 1rem",
                        background: COLORS.tealPale, borderRadius: 12,
                      }}
                    >
                      <div style={{ display: "flex", alignItems: "center", gap: "0.6rem", marginBottom: "0.4rem" }}>
                        <div
                          style={{
                            width: 28, height: 28, borderRadius: "50%",
                            background: `linear-gradient(135deg, ${COLORS.gold}, ${COLORS.goldLight})`,
                            color: COLORS.white, display: "flex", alignItems: "center",
                            justifyContent: "center", fontWeight: 700, fontSize: "0.75rem",
                          }}
                        >
                          {reply.avatar}
                        </div>
                        <span style={{ fontWeight: 700, fontSize: "0.85rem", color: COLORS.dark }}>
                          {reply.author}
                        </span>
                      </div>
                      <p style={{ fontSize: "0.9rem", color: COLORS.darkSoft, lineHeight: 1.65, marginBottom: "0.5rem" }}>
                        {reply.content}
                      </p>
                      <button
                        onClick={() => handleLikeReply(post.id, reply.id)}
                        style={{
                          background: "none", border: "none", cursor: "pointer",
                          color: reply.likedByMe ? COLORS.teal : COLORS.grayLight,
                          fontSize: "0.8rem", fontWeight: reply.likedByMe ? 700 : 400,
                          fontFamily: "'Source Sans 3', sans-serif",
                        }}
                      >
                        <svg width="12" height="11" viewBox="0 0 14 13" fill={reply.likedByMe ? "currentColor" : "none"} stroke="currentColor" strokeWidth="1.4">
                          <path d="M7 11.5C7 11.5 1 8 1 4.2A3 3 0 0 1 7 3a3 3 0 0 1 6 1.2C13 8 7 11.5 7 11.5Z" strokeLinecap="round" strokeLinejoin="round"/>
                        </svg>
                        {reply.likes}
                      </button>
                    </div>
                  ))}
                </div>
              )}

              {/* Formulaire de réponse */}
              {activeReply === post.id && (
                <div style={{ marginTop: "1rem", paddingTop: "1rem", borderTop: "1px solid rgba(0,0,0,0.05)" }}>
                  <input
                    placeholder="Ton prénom"
                    value={replyInputs[post.id]?.author || ""}
                    onChange={(e) =>
                      setReplyInputs((prev) => ({
                        ...prev,
                        [post.id]: { ...prev[post.id], author: e.target.value },
                      }))
                    }
                    style={{ ...communauteInputStyle, marginBottom: "0.6rem" }}
                  />
                  <textarea
                    placeholder="Ta réponse..."
                    value={replyInputs[post.id]?.content || ""}
                    onChange={(e) =>
                      setReplyInputs((prev) => ({
                        ...prev,
                        [post.id]: { ...prev[post.id], content: e.target.value },
                      }))
                    }
                    rows={3}
                    style={{ ...communauteInputStyle, marginBottom: "0.7rem", resize: "vertical" }}
                  />
                  <div style={{ display: "flex", gap: "0.6rem" }}>
                    <button
                      onClick={() => handleSubmitReply(post.id)}
                      style={{
                        padding: "0.5rem 1.2rem", borderRadius: 10, border: "none",
                        background: COLORS.teal, color: COLORS.white,
                        fontWeight: 700, fontSize: "0.85rem", cursor: "pointer",
                        fontFamily: "'Source Sans 3', sans-serif",
                      }}
                    >
                      Répondre
                    </button>
                    <button
                      onClick={() => setActiveReply(null)}
                      style={{
                        padding: "0.5rem 1.2rem", borderRadius: 10,
                        border: "1px solid rgba(0,0,0,0.1)", background: "transparent",
                        color: COLORS.gray, fontSize: "0.85rem", cursor: "pointer",
                        fontFamily: "'Source Sans 3', sans-serif",
                      }}
                    >
                      Annuler
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Pied de page communauté */}
      <div style={{ textAlign: "center", marginTop: "3rem", padding: "2rem", color: COLORS.grayLight, fontSize: "0.85rem" }}>

}

// ────── MAIN APP ──────
function App() {
  const [activeChapter, setActiveChapter] = useState(() =>
    localStorage.getItem("lastChapter") || "home"
  );
  const [visited, setVisited] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem("visitedChapters") || "[]")); }
    catch { return new Set(["home"]); }
  });
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [isMobile, setIsMobile] = useState(() => window.innerWidth < 768);
  const [focusMode, setFocusMode] = useState(false);
  const [onboardingDone, setOnboardingDone] = useState(() =>
    !!localStorage.getItem("onboarding_done")
  );
  const contentRef = useRef(null);

  useEffect(() => {
    if (contentRef.current) contentRef.current.scrollTop = 0;
    setVisited(prev => {
      const next = new Set(prev).add(activeChapter);
      localStorage.setItem("visitedChapters", JSON.stringify([...next]));
      return next;
    });
  }, [activeChapter]);

  useEffect(() => {
    const handleResize = () => setIsMobile(window.innerWidth < 768);
    window.addEventListener("resize", handleResize);
    return () => window.removeEventListener("resize", handleResize);
  }, []);

  const navigate = (id) => {
    localStorage.setItem("lastChapter", id);
    setActiveChapter(id);
    setSidebarOpen(false);
  };

  const handleOnboardingComplete = (recommendedChapter) => {
    localStorage.setItem("onboarding_done", "1");
    setOnboardingDone(true);
    navigate(recommendedChapter);
  };

  const renderContent = () => {
    switch(activeChapter) {
      case "home": return <HomeSection />;
      case "intro": return <IntroSection />;
      case "islam": return <IslamSection />;
      case "environnement": return <EnvironnementSection />;
      case "comportements": return <ComportementsSection />;
      case "reparation": return <ReparationSection />;
      case "neurosciences": return <NeurosciencesSection />;
      case "monde": return <MondeSection />;
      case "productivite": return <ProductiviteSection />;
      case "rechute": return <RechuteSection />;
      case "programme": return <ProgrammeSection />;
      default: return <HomeSection />;
    }
  };

  const currentIdx = CHAPTERS.findIndex(c => c.id === activeChapter);
  const showNotes = !["home"].includes(activeChapter);
  const showSidebar = !focusMode && !(isMobile && !sidebarOpen);

  return (
    <div style={{ display: "flex", height: "100vh", overflow: "hidden", background: COLORS.cream }}>
      <style>{globalStyles}</style>

      {/* Onboarding overlay */}
      {!onboardingDone && (
        <Onboarding onComplete={handleOnboardingComplete} />
      )}

      {/* Sidebar overlay on mobile */}
      {sidebarOpen && !focusMode && (
        <div onClick={() => setSidebarOpen(false)} style={{
          position: "fixed", inset: 0, background: "rgba(0,0,0,0.3)", zIndex: 40
        }} />
      )}

      {/* Sidebar */}
      {showSidebar && (
        <nav style={{
          width: 280, minWidth: 280, height: "100vh", overflowY: "auto",
          background: COLORS.white, borderRight: `1px solid rgba(27,107,95,0.08)`,
          padding: "1.5rem 0",
          position: sidebarOpen ? "fixed" : "relative",
          zIndex: 50, left: 0, top: 0,
        }}>
          {/* Logo */}
          <div style={{
            padding: "0 1.5rem 1.2rem", textAlign: "center",
            borderBottom: `1px solid rgba(0,0,0,0.05)`, marginBottom: "0.2rem"
          }}>
            <div style={{
              width: 52, height: 52, margin: "0 auto 0.8rem", borderRadius: "50%",
              background: `linear-gradient(135deg, ${COLORS.teal}, ${COLORS.tealLight})`,
              display: "flex", alignItems: "center", justifyContent: "center",
              border: `2px solid ${COLORS.gold}`
            }}>
              <span style={{ fontFamily: "'Amiri', serif", fontSize: "1.1rem", color: COLORS.gold }}>﷽</span>
            </div>
            <div style={{ fontFamily: "'Playfair Display', serif", fontWeight: 700, fontSize: "0.95rem", color: COLORS.dark }}>
              JADIS
            </div>
            <div style={{ fontSize: "0.72rem", color: COLORS.gold, fontWeight: 600, letterSpacing: "0.06em", marginTop: "0.15rem" }}>
              Le Retour du Croyant
            </div>
          </div>

          {/* Progress bar */}
          <SidebarProgressBar />

          {/* Nav items */}
          {CHAPTERS.map((ch) => {
            const isActive = activeChapter === ch.id;
            const isDone = !isActive && visited.has(ch.id);
            return (
              <button key={ch.id} onClick={() => navigate(ch.id)} style={{
                display: "flex", alignItems: "center", gap: "0.7rem",
                width: "100%", padding: "0.65rem 1.5rem", border: "none",
                background: isActive ? COLORS.tealPale : "transparent",
                cursor: "pointer", textAlign: "left", fontFamily: "'Source Sans 3', sans-serif",
                fontSize: "0.87rem", fontWeight: isActive ? 600 : 400,
                color: isActive ? COLORS.teal : COLORS.gray,
                borderLeft: isActive ? `3px solid ${COLORS.teal}` : "3px solid transparent",
                transition: "all 0.2s"
              }}>
                <span style={{ flex: 1 }}>{ch.title}</span>
                {isDone && (
                  <svg width="12" height="10" viewBox="0 0 12 10" fill="none">
                    <path d="M1 5L4.2 8.5L11 1.5" stroke={COLORS.tealLight} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                  </svg>
                )}
              </button>
            );
          })}
        </nav>
      )}

      {/* Main */}
      <main ref={contentRef} style={{ flex: 1, overflowY: "auto", padding: "0", scrollBehavior: "auto" }}>
        {/* Top bar */}
        <div style={{
          position: "sticky", top: 0, zIndex: 30, background: "rgba(251,248,242,0.95)",
          backdropFilter: "blur(8px)", borderBottom: "1px solid rgba(0,0,0,0.05)",
          padding: "0.75rem 2rem", display: "flex", alignItems: "center", justifyContent: "space-between"
        }}>
          {/* Hamburger — masqué en focus */}
          {!focusMode ? (
            <button onClick={() => setSidebarOpen(!sidebarOpen)} style={{
              background: "none", border: "none", cursor: "pointer",
              color: COLORS.teal, padding: "0.3rem", display: "flex", alignItems: "center"
            }}>
              <svg width="20" height="14" viewBox="0 0 20 14" fill="none">
                <path d="M1 1h18M1 7h18M1 13h18" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/>
              </svg>
            </button>
          ) : <div style={{ width: 28 }} />}

          <span style={{ fontSize: "0.83rem", fontWeight: 600, color: COLORS.gray }}>
            {CHAPTERS.find(c => c.id === activeChapter)?.title}
          </span>

          {/* Droite : compteur + bouton Focus */}
          <div style={{ display: "flex", alignItems: "center", gap: "0.8rem" }}>
            <span style={{ fontSize: "0.72rem", color: COLORS.grayLight, fontWeight: 600 }}>
              {currentIdx + 1}/{CHAPTERS.length}
            </span>
            <button
              onClick={() => setFocusMode(f => !f)}
              style={{
                background: focusMode ? COLORS.tealPale : "transparent",
                border: `1px solid ${focusMode ? COLORS.teal : "rgba(27,107,95,0.2)"}`,
                color: COLORS.teal, borderRadius: 8,
                padding: "0.25rem 0.7rem", fontSize: "0.72rem",
                fontWeight: 600, cursor: "pointer",
                fontFamily: "'Source Sans 3', sans-serif",
                letterSpacing: "0.02em", transition: "all 0.2s"
              }}
            >
              {focusMode ? "Quitter Focus" : "Focus"}
            </button>
          </div>
        </div>

        {/* Content */}
        <div
          className={focusMode ? "focus-mode-content" : ""}
          style={{ maxWidth: focusMode ? 860 : 780, margin: "0 auto", padding: "2rem 2rem 4rem" }}
        >
          {renderContent()}

          {/* Notes personnelles */}
          {showNotes && <ChapterNotes chapterId={activeChapter} />}

          {/* Navigation buttons */}
          <div style={{
            display: "flex", justifyContent: "space-between", marginTop: "2.5rem",
            paddingTop: "2rem", borderTop: `1px solid rgba(0,0,0,0.06)`
          }}>
            {currentIdx > 0 ? (
              <button onClick={() => navigate(CHAPTERS[currentIdx - 1].id)} style={{
                padding: "0.7rem 1.4rem", borderRadius: 10, border: `1px solid rgba(27,107,95,0.2)`,
                background: "transparent", cursor: "pointer", color: COLORS.teal,
                fontWeight: 600, fontSize: "0.88rem", fontFamily: "'Source Sans 3', sans-serif",
                display: "flex", alignItems: "center", gap: "0.4rem"
              }}>
                <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
                  <path d="M13 5H1M1 5L5 1M1 5L5 9" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
                {CHAPTERS[currentIdx - 1].title}
              </button>
            ) : <div />}
            {currentIdx < CHAPTERS.length - 1 && (
              <button onClick={() => navigate(CHAPTERS[currentIdx + 1].id)} style={{
                padding: "0.7rem 1.4rem", borderRadius: 10, border: "none",
                background: COLORS.teal, cursor: "pointer", color: COLORS.white,
                fontWeight: 600, fontSize: "0.88rem", fontFamily: "'Source Sans 3', sans-serif",
                display: "flex", alignItems: "center", gap: "0.4rem"
              }}>
                {CHAPTERS[currentIdx + 1].title}
                <svg width="14" height="10" viewBox="0 0 14 10" fill="none">
                  <path d="M1 5H13M13 5L9 1M13 5L9 9" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            )}
          </div>
        </div>
      </main>

      {/* Bouton sortie Focus flottant */}
      {focusMode && (
        <button className="focus-exit-btn" onClick={() => setFocusMode(false)}>
          Quitter le mode Focus
        </button>
      )}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Mode embarqué : masque la nav du site quand chargé dans un iframe (dashboard)
(function() {
  var isEmbedded = window.self !== window.top || new URLSearchParams(window.location.search).get('embedded') === '1';
  if (isEmbedded) {
    var style = document.createElement('style');
    style.textContent = '.site-topnav { display: none !important; } #root { padding-top: 0 !important; }';
    document.head.appendChild(style);
  }
})();
  </script>
</body>
</html>
