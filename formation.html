<!-- ═══════════════════════════════════════════════════
     GARDE D'AUTHENTIFICATION
     Bloque l'accès direct sans login + paiement vérifié.
     Si chargé en iframe (dashboard), le parent a déjà tout
     vérifié — on laisse passer sans toucher au DOM.
════════════════════════════════════════════════════════ -->
<script>
(function() {
  // En iframe depuis le dashboard : accès autorisé, le parent gère l'auth
  if (window.self !== window.top) return;

  // Accès standalone détecté — masquer le contenu pendant la vérification
  document.documentElement.style.visibility = 'hidden';

  function redirect(path) {
    window.location.replace(path);
  }

  var fbAuth = null;
  var fbDb = null;
  try {
    // Firebase peut déjà être init (même page rechargée) — on attrape l'erreur
    try { firebase.initializeApp(FIREBASE_CONFIG); } catch(e) {}
    fbAuth = firebase.auth();
    fbDb   = firebase.firestore();
  } catch(e) {
    // Firebase non disponible — on redirige par sécurité
    redirect('dashboard.html');
    return;
  }

  fbAuth.onAuthStateChanged(function(user) {
    if (!user) {
      redirect('dashboard.html');
      return;
    }

    var emailLower = user.email.toLowerCase();

    // Admin : accès total sans vérification Firestore
    if (isAdminEmail(emailLower)) {
      document.documentElement.style.visibility = '';
      return;
    }

    // Vérifie le paiement dans Firestore
    fbDb.collection('subscribers').doc(emailLower).get()
      .then(function(doc) {
        if (doc.exists) {
          document.documentElement.style.visibility = '';
        } else {
          // Connecté mais pas abonné → retour au dashboard (paywall)
          redirect('dashboard.html?paywall=1');
        }
      })
      .catch(function() {
        // Erreur Firestore → fallback localStorage
        try {
          var data = JSON.parse(localStorage.getItem('jadis_subscribers') || '{"emails":[]}');
          var known = data.emails.map(function(e){ return e.toLowerCase(); });
          if (known.indexOf(emailLower) !== -1) {
            document.documentElement.style.visibility = '';
          } else {
            redirect('dashboard.html?paywall=1');
          }
        } catch(e2) {
          redirect('dashboard.html');
        }
      });
  });
})();
</script>

  <script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
function useChapterProgress() {
  const [completed, setCompleted] = useState(() => {
    try { return JSON.parse(localStorage.getItem("chapter_progress") || "[]"); }
    catch { return []; }
  });
  useEffect(() => {
    const sync = () => {
      try { setCompleted(JSON.parse(localStorage.getItem("chapter_progress") || "[]")); }
      catch {}
    };
    window.addEventListener("chapterCompleted", sync);
    return () => window.removeEventListener("chapterCompleted", sync);
  }, []);
  return completed;
}

/* Particle container */

  position: absolute;
  inset: 0;
  pointer-events: none;
}
.wow-p {
  position: absolute;
  top: 50%;
  left: 50%;
  border-radius: 50%;
  transform-origin: center;
  animation: wowParticle var(--dur) cubic-bezier(0.2, 0.8, 0.4, 1) var(--delay) both;
}
@keyframes wowParticle {
  0%   { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0) scale(1); opacity: 1; }
  70%  { opacity: 1; }
  100% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--dist)) scale(0.2); opacity: 0; }
}
.wow-p-diamond {
  border-radius: 2px;
  transform-origin: center;
  animation: wowParticleDiamond var(--dur) cubic-bezier(0.2, 0.8, 0.4, 1) var(--delay) both;
}
@keyframes wowParticleDiamond {
  0%   { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(0) rotate(45deg) scale(1); opacity: 1; }
  70%  { opacity: 0.9; }
  100% { transform: translate(-50%, -50%) rotate(var(--angle)) translateX(var(--dist)) rotate(135deg) scale(0.1); opacity: 0; }
}

function Tip({ children }) {
  return (
    <div className="tip-box">
      <div className="tip-content">{children}</div>
    </div>
  );
}

function ChecklistBox({ title, items }) {
  const [checked, setChecked] = useState(new Set());
  const toggle = (i) => setChecked(prev => {
    const next = new Set(prev);
    next.has(i) ? next.delete(i) : next.add(i);
    return next;
  });
  return (
    <div style={{ margin: "1.5rem 0" }}>
      {title && <h4 style={{ marginBottom: "0.8rem" }}>{title}</h4>}
      {items.map((item, i) => (
        <div key={i} className={`checklist-item${checked.has(i) ? " checked" : ""}`} onClick={() => toggle(i)}>
          <div className="checklist-checkbox">
            {checked.has(i) && (
              <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
                <path d="M1 4L3.8 7L9 1" stroke="white" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            )}
          </div>
          <span>{item}</span>
        </div>
      ))}
      <div style={{ fontSize: "0.8rem", color: "#9CA3AF", marginTop: "0.5rem", textAlign: "right" }}>
        {checked.size}/{items.length} accompli{checked.size > 1 ? "s" : ""}
      </div>
    </div>
  );
}

function ProgressPath({ completed, total }) {
  const pct = completed / total;
  const sunR = 7 + pct * 20;
  const sunOpacity = 0.3 + pct * 0.7;
  const glowR = sunR + 18 + pct * 22;

  return (
    <svg viewBox="0 0 400 210" xmlns="http://www.w3.org/2000/svg"
      style={{ width: "100%", maxWidth: 400, display: "block", margin: "0 auto" }}>
      <defs>
        <linearGradient id="pp-sky" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#07051a" />
          <stop offset="60%" stopColor="#0c1f1c" />
          <stop offset="100%" stopColor="#152e28" />
        </linearGradient>
        <radialGradient id="pp-glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor="#C4A35A" stopOpacity={sunOpacity} />
          <stop offset="100%" stopColor="#C4A35A" stopOpacity="0" />
        </radialGradient>
        <linearGradient id="pp-road" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#221808" />
          <stop offset="100%" stopColor="#4a3820" />
        </linearGradient>
        <linearGradient id="pp-ground" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor="#261a08" />
          <stop offset="100%" stopColor="#140e04" />
        </linearGradient>
      </defs>

      <rect width="400" height="210" fill="url(#pp-sky)" />
      <ellipse cx="200" cy="82" rx={glowR} ry={glowR * 0.65} fill="url(#pp-glow)" />
      <circle cx="200" cy="82" r={sunR} fill="#C4A35A" opacity={Math.min(sunOpacity + 0.1, 1)} />
      <path d="M 0 138 Q 200 128 400 138 L 400 210 L 0 210 Z" fill="url(#pp-ground)" />
      <path d="M 152 210 L 192 84 L 208 84 L 248 210 Z" fill="url(#pp-road)" />

      {[0.12, 0.32, 0.52, 0.72, 0.88].map((t, i) => {
        const y = 210 - t * 126;
        const w = Math.max(1.5 - t * 1.1, 0.3);
        const h = Math.max(7 - t * 5, 1.5);
        return <rect key={i} x={200 - w / 2} y={y} width={w} height={h} fill="#C4A35A" opacity="0.2" rx="0.5" />;
      })}

      {Array.from({ length: total }, (_, i) => {
        const t = (i + 0.5) / total;
        const y = 210 - t * 126;
        const roadHalfW = (1 - t) * 42 + 8;
        const side = i % 2 === 0 ? -1 : 1;
        const x = 200 + side * roadHalfW * 0.52;
        const r = Math.max(3.8 - t * 2.2, 1.2);
        const isLit = i < completed;
        return (
          <g key={i}>
            {isLit && <circle cx={x} cy={y} r={r + 5} fill="#C4A35A" opacity="0.15" />}
            <circle cx={x} cy={y} r={r} fill={isLit ? "#C4A35A" : "rgba(255,255,255,0.12)"} />
          </g>
        );
      })}

      {completed > 0 && (() => {
        const i = completed - 1;
        const t = (i + 0.5) / total;
        const y = 210 - t * 126;
        const roadHalfW = (1 - t) * 42 + 8;
        const side = i % 2 === 0 ? -1 : 1;
        const x = 200 + side * roadHalfW * 0.52;
        const scale = Math.max(0.38, 1 - t * 0.62);
        const h = 14 * scale;
        const hw = 4.5 * scale;
        return (
          <g>
            <circle cx={x} cy={y - h * 0.88} r={hw * 0.62} fill="white" opacity="0.92" />
            <rect x={x - hw * 0.32} y={y - h * 0.68} width={hw * 0.64} height={h * 0.66} rx="1" fill="white" opacity="0.88" />
          </g>
        );
      })()}
    </svg>
  );
}

function ChapterCompletion({ chapterId, chapterTitle }) {
  const CONTENT_CHAPTERS = [
    "intro","islam","environnement","comportements",
    "reparation","neurosciences","monde","productivite","rechute","programme"
  ];
  const TOTAL = CONTENT_CHAPTERS.length;

  const [done, setDone] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("chapter_progress") || "[]");
      return Array.isArray(saved) ? saved : [];
    } catch { return []; }
  });
  const [showModal, setShowModal] = useState(false);

  // Local checkboxes state
  const checks = CHAPTER_CHECKS[chapterId] || [];
  const storageKey = `chap_checks_${chapterId}`;
  const [checkedItems, setCheckedItems] = useState(() => {
    try { return JSON.parse(localStorage.getItem(storageKey) || "[]"); }
    catch { return []; }
  });

  const toggleCheckItem = (idx) => {
    setCheckedItems(prev => {
      const next = prev.includes(idx) ? prev.filter(i => i !== idx) : [...prev, idx];
      localStorage.setItem(storageKey, JSON.stringify(next));
      return next;
    });
  };

  const allChecked = checks.length === 0 || checkedItems.length >= checks.length;

  const isCompleted = done.includes(chapterId);
  const completedCount = done.filter(id => CONTENT_CHAPTERS.includes(id)).length;

  const handleComplete = () => {
    if (isCompleted || !allChecked) return;
    const next = [...done, chapterId];
    setDone(next);
    localStorage.setItem("chapter_progress", JSON.stringify(next));
    window.dispatchEvent(new Event("chapterCompleted"));
    setShowModal(true);
  };

  const getMessage = (count) => {
    if (count <= 3) return "Tu poses les premières pierres de ton chemin. Chaque pas que tu fais compte devant Allah.";
    if (count <= 7) return "Tu es en route. La lumière grandit à l'horizon. Continue — la constance vaut plus que l'intensité.";
    if (count < TOTAL) return "Tu approches du sommet. Allah voit ton effort. « Innallaha la yudîy'u ajra al-muhsinîn. »";
    return "Tu as parcouru tout le chemin. Que Allah scelle cette transformation et la rende durable.";
  };

  const getArabic = (count) => {
    if (count < TOTAL) return "وَٱللَّهُ يُحِبُّ ٱلصَّٰبِرِينَ";
    return "إِنَّ اللَّهَ لَا يُضِيعُ أَجْرَ الْمُحْسِنِينَ";
  };

  // Generate particles once per mount
  const particles = useRef(null);
  if (!particles.current) {
    const PARTICLE_COUNT = 56;
    particles.current = Array.from({ length: PARTICLE_COUNT }, (_, i) => {
      const angle = (i / PARTICLE_COUNT) * 360;
      const isDiamond = i % 4 === 0;
      const isLine = i % 7 === 0;
      const colors = ['#C4A35A','#C4A35A','#2A5C50','rgba(255,255,255,0.8)','#E8D5A0','#2A5C50'];
      const color = colors[i % colors.length];
      const dist = 120 + Math.random() * 220;
      const size = isLine ? `${1 + Math.random() * 1.5}px` : `${3 + Math.random() * 6}px`;
      const height = isLine ? `${8 + Math.random() * 16}px` : size;
      const dur = `${0.55 + Math.random() * 0.6}s`;
      const delay = `${Math.random() * 0.25}s`;
      return { angle, dist, color, size, height, dur, delay, isDiamond };
    });
  }

  return (
    <>
      <div className="chapter-completion">
        {isCompleted ? (
          <div className="chapter-completion-done">
            <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
              <path d="M1.5 6L5.5 10.5L14.5 1.5" stroke={COLORS.gold} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
            <span>Chapitre complété</span>
          </div>
        ) : (
          <>
            {checks.length > 0 && (
              <div style={{ marginBottom: "1.5rem", textAlign: "left" }}>
                <p style={{ fontSize: "0.78rem", fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", color: COLORS.tealLight, marginBottom: "0.8rem" }}>
                  Valide ces points avant de continuer
                </p>
                {checks.map((text, idx) => {
                  const isChecked = checkedItems.includes(idx);
                  return (
                    <div key={idx} onClick={() => toggleCheckItem(idx)} style={{
                      display: "flex", alignItems: "flex-start", gap: "0.75rem",
                      padding: "0.6rem 0.9rem", marginBottom: "0.4rem",
                      background: isChecked ? `rgba(27,107,95,0.06)` : COLORS.white,
                      border: `1px solid ${isChecked ? "rgba(27,107,95,0.2)" : "rgba(0,0,0,0.07)"}`,
                      borderRadius: 10, cursor: "pointer", transition: "all 0.18s",
                      userSelect: "none"
                    }}>
                      <div style={{
                        width: 20, height: 20, minWidth: 20, borderRadius: 6,
                        border: `2px solid ${isChecked ? COLORS.teal : "rgba(0,0,0,0.15)"}`,
                        background: isChecked ? COLORS.teal : "transparent",
                        display: "flex", alignItems: "center", justifyContent: "center",
                        transition: "all 0.18s", marginTop: 1
                      }}>
                        {isChecked && <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L3.8 7.5L10 1" stroke="white" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </div>
                      <span style={{ fontSize: "0.9rem", color: isChecked ? COLORS.gray : COLORS.darkSoft, textDecoration: isChecked ? "line-through" : "none", lineHeight: 1.5 }}>{text}</span>
                    </div>
                  );
                })}
                {!allChecked && (
                  <p style={{ fontSize: "0.78rem", color: COLORS.grayLight, marginTop: "0.6rem", fontStyle: "italic" }}>
                    Coche toutes les cases pour débloquer la validation.
                  </p>
                )}
              </div>
            )}
            <button
              className="chapter-complete-btn"
              onClick={handleComplete}
              disabled={!allChecked}
              style={{ opacity: allChecked ? 1 : 0.4, cursor: allChecked ? "pointer" : "not-allowed", transition: "opacity 0.3s" }}
            >
              J'ai pris connaissance de ce chapitre
            </button>
          </>
        )}
      </div>

      {showModal && (
        <div className="wow-screen">

          {/* Islamic geometry background */}
          <div className="wow-geo-bg">
            <svg width="700" height="700" viewBox="0 0 700 700" fill="none" opacity="0.04">
              <circle cx="350" cy="350" r="320" stroke="#C4A35A" strokeWidth="1"/>
              <circle cx="350" cy="350" r="260" stroke="#C4A35A" strokeWidth="0.6"/>
              <circle cx="350" cy="350" r="200" stroke="#C4A35A" strokeWidth="0.5"/>
              <circle cx="350" cy="350" r="140" stroke="#C4A35A" strokeWidth="0.4"/>
              {[0,30,60,90,120,150,180,210,240,270,300,330].map(a => {
                const r1 = 140, r2 = 320;
                const x1 = 350 + r1 * Math.cos(a * Math.PI / 180);
                const y1 = 350 + r1 * Math.sin(a * Math.PI / 180);
                const x2 = 350 + r2 * Math.cos(a * Math.PI / 180);
                const y2 = 350 + r2 * Math.sin(a * Math.PI / 180);
                return <line key={a} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#C4A35A" strokeWidth="0.5"/>;
              })}
              {[0,45,90,135].map(a => {
                const pts = [0,72,144,216,288].map(d => {
                  const x = 350 + 220 * Math.cos((a + d) * Math.PI / 180);
                  const y = 350 + 220 * Math.sin((a + d) * Math.PI / 180);
                  return `${x},${y}`;
                }).join(' ');
                return <polygon key={a} points={pts} stroke="#C4A35A" strokeWidth="0.4" fill="none"/>;
              })}
            </svg>
          </div>

          {/* Particles burst */}
          <div className="wow-particles">
            {particles.current.map((p, i) => (
              <div
                key={i}
                className={p.isDiamond ? "wow-p wow-p-diamond" : "wow-p"}
                style={{
                  width: p.size,
                  height: p.height,
                  background: p.color,
                  "--angle": `${p.angle}deg`,
                  "--dist": `${p.dist}px`,
                  "--dur": p.dur,
                  "--delay": p.delay,
                }}
              />
            ))}
          </div>

          {/* Main card */}
          <div className="wow-card">
            {/* Ring + checkmark */}
            <div className="wow-ring-wrap">
              <div className="wow-ring-pulse" />
              <div className="wow-ring-outer" />
              <div className="wow-ring-inner" />
              <div className="wow-check-circle">
                <svg className="wow-check-svg" viewBox="0 0 48 48" fill="none">
                  <path
                    className="wow-check-path"
                    d="M10 24L20 34L38 14"
                    stroke="#C4A35A"
                    strokeWidth="3.5"
                    strokeLinecap="round"
                    strokeLinejoin="round"
                  />
                </svg>
              </div>
            </div>

            {/* Arabic verse */}
            <div className="wow-arabic">{getArabic(completedCount)}</div>

            {/* Title */}
            <div className="wow-title">Bien <span>joué</span></div>

            {/* Chapter label */}
            <div className="wow-chapter-label">{chapterTitle}</div>

            {/* Progress dots */}
            <div className="wow-progress-track">
              {Array.from({ length: TOTAL }, (_, i) => {
                const litCount = completedCount;
                if (i < litCount - 1) return <div key={i} className="wow-progress-dot lit" />;
                if (i === litCount - 1) return <div key={i} className="wow-progress-dot current" />;
                return <div key={i} className="wow-progress-dot" />;
              })}
            </div>

            {/* Message */}
            <div className="wow-message">{getMessage(completedCount)}</div>

            {/* CTA */}
            <button className="wow-btn" onClick={() => setShowModal(false)}>
              Continuer
              <span className="wow-btn-arrow">→</span>
            </button>
          </div>
        </div>
      )}
    </>
  );
}

function ExerciseTimer() {
  const [running, setRunning] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const [preset, setPreset] = useState(null);
  const intervalRef = useRef(null);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setElapsed(e => {
          if (preset && e + 1 >= preset) {
            setRunning(false);
            clearInterval(intervalRef.current);
            return preset;
          }
          return e + 1;
        });
      }, 1000);
    } else {
      clearInterval(intervalRef.current);
    }
    return () => clearInterval(intervalRef.current);
  }, [running, preset]);

  const fmt = (s) => `${Math.floor(s / 60)}:${(s % 60).toString().padStart(2, "0")}`;
  const isDone = preset !== null && elapsed >= preset;
  const display = preset !== null ? fmt(Math.max(0, preset - elapsed)) : fmt(elapsed);

  return (
    <div className="exercise-timer">
      <span className="timer-display" style={{ color: isDone ? COLORS.gold : COLORS.teal }}>
        {display}
      </span>
      <div style={{ display: "flex", gap: "0.4rem" }}>
        {[5, 10, 15].map(min => (
          <button key={min}
            className={`timer-btn${preset === min * 60 ? " active" : ""}`}
            onClick={() => { setPreset(min * 60); setElapsed(0); setRunning(false); }}
          >{min} min</button>
        ))}
      </div>
      {!isDone ? (
        <button className={`timer-btn${running ? " active" : ""}`}
          onClick={() => setRunning(r => !r)}>
          {running ? "Pause" : elapsed > 0 ? "Reprendre" : "Démarrer"}
        </button>
      ) : (
        <span style={{ fontSize: "0.82rem", color: COLORS.gold, fontWeight: 600 }}>Terminé</span>
      )}
      {elapsed > 0 && !running && (
        <button className="timer-btn" onClick={() => { setElapsed(0); setRunning(false); }}
          style={{ opacity: 0.6 }}>Reset</button>
      )}
    </div>
  );
}

function Onboarding({ onComplete }) {
  const [step, setStep] = useState(0);
  const [recs, setRecs] = useState([]);
  const total = ONBOARDING_Q.length;
  const current = ONBOARDING_Q[step];

  const handleSelect = (rec) => {
    const next = [...recs, rec];
    if (step < total - 1) {
      setRecs(next);
      setStep(s => s + 1);
    } else {
      const freq = {};
      next.forEach(r => { freq[r] = (freq[r] || 0) + 1; });
      const best = Object.entries(freq).sort((a, b) => b[1] - a[1])[0][0];
      onComplete(best);
    }
  };

  return (
    <div className="onboarding-overlay">
      <div className="onboarding-card fade-in-up">
        <div style={{ marginBottom: "2rem" }}>
          <span style={{ fontSize: "1.6rem", fontFamily: "'Amiri', serif", color: COLORS.gold }}>﷽</span>
        </div>
        <div className="onboarding-prog-track">
          <div className="onboarding-prog-fill" style={{ width: `${(step / total) * 100}%` }} />
        </div>

function IntroSection() {

      <p>Cette formation n'a pas été écrite par un imam. Pas par un psychologue. Pas par un neuroscientifique. Elle a été écrite par quelqu'un qui a traversé ce dont elle parle — la foi qui vacille, l'environnement qui détruit, les comportements qu'on ne comprend pas, les relations qui échouent.</p>
      <p>Ce que vous allez lire s'appuie sur des travaux islamiques, des recherches en psychologie, en neurosciences et en philosophie. Ces références sont citées honnêtement. Mais elles ne font pas de cette formation un traitement médical ni une fatwa. Ce sont des outils. À vous de les utiliser avec discernement.</p>

      <Divider />

      <h3>Pourquoi cette formation existe</h3>
      <p>La plupart des formations religieuses vous apprennent <strong>ce qu'il faut faire</strong>. La plupart des formations de développement personnel vous apprennent <strong>comment le faire</strong>. Aucune des deux ne vous dit vraiment <strong>pourquoi vous n'arrivez pas à le faire</strong> — alors que vous savez déjà ce que vous devriez faire.</p>
      <p>C'est le vrai problème. Pas l'ignorance. <strong>Le blocage.</strong></p>
      <p>Vous savez que vous devriez prier. Vous savez que vous devriez manger mieux, dormir plus tôt, faire du sport. Vous savez tout ça. Et pourtant quelque chose résiste. Cette formation existe pour aller chercher ce quelque chose.</p>

      <StudyBox>
        <p style={{margin:0}}>Les vérités que la psychologie et les neurosciences documentent depuis un siècle trouvent un écho remarquable dans les travaux des savants musulmans — Al-Ghazali décrivait le fonctionnement de l'inconscient au XIème siècle, Ibn al-Qayyim théorisait les mécanismes de la récompense bien avant la neurologie moderne, Al-Muhāsibī pratiquait l'examen de conscience structuré au IXème siècle. Cette formation réunit les deux : la rigueur scientifique et la boussole spirituelle.</p>

      <h3>Comment lire cette formation</h3>
      <p>Cette formation se lit dans l'ordre. Chaque partie s'appuie sur la précédente. Ne lisez pas d'une traite. Prenez le temps de chaque partie. Faites les exercices vraiment. Ce que vous n'écrivez pas, vous ne le traitez pas.</p>

function MiroirSection() {
  const mirrorQuestions = [
    "Quelles sont les trois actions que cette personne répète le plus souvent et qui détruisent son quotidien ?",
    "Quelles sont les trois choses que cette personne évite de faire, qu'elle sait qu'elle devrait faire ?",
    "Où va l'attention de cette personne quand elle n'est pas sur ce qui compte vraiment ?",
    "Quel potentiel cette personne est-elle en train de gaspiller par confort ou par peur ?",
    "Si cette personne vivait dans un film, qu'est-ce que l'audience crierait devant l'écran ?",
  ];
  const projectionQuestions = [
    "Le physique — Comment sera votre corps ? Votre énergie au quotidien ?",
    "Le mental — Quelle image aurez-vous de vous-même ?",
    "Les relations — Quelle sera la qualité de vos relations proches ?",
    "La foi — Où en serez-vous dans votre relation avec Allah ?",
    "Les projets — Qu'aurez-vous construit ou accompli ?",
    "Le sens — Vivrez-vous en accord avec vos valeurs profondes ?",
  ];

  return (
    <div className="section-content fade-in">
      <ChapterHeader title="Le Processus Miroir" verse="Examinez-vous avant d'être examinés" verseRef="Omar ibn al-Khattab" />

      <p>Avant de lire la suite, il y a une étape <strong>obligatoire</strong>. Pas optionnelle. Parce que cette formation ne peut pas vous aider si vous ne savez pas honnêtement où vous en êtes. La vraie version. Pas celle que vous montrez aux autres.</p>

      <p>Ce qu'on appelle le Processus Miroir, c'est ceci : <strong>se regarder sans filtre</strong>. Se voir tel qu'on est — pas tel qu'on voudrait être. C'est inconfortable. Mais sans cette étape, vous lisez une formation sur la transformation en restant exactement la même personne qui évite de se transformer.</p>

      <ActionBox title="L'exercice — à faire maintenant">
        <p>Prenez une feuille. Pas votre téléphone — <strong>une feuille</strong>. Écrivez à la main. Imaginez que vous êtes un consultant externe engagé pour analyser la vie de quelqu'un. Vous avez accès à tout. Maintenant imaginez que cette personne, c'est vous.</p>
      </ActionBox>

      <h3>Les 5 questions du miroir</h3>
      <QuestionPager questions={mirrorQuestions} />

      <Divider />

      <h3>La Projection — dans 3 ans si rien ne change</h3>
      <p>Pas dans 3 ans si vous changez tout. Dans 3 ans si vous continuez <strong>exactement</strong> comme aujourd'hui. Mêmes habitudes. Même gestion de votre attention. Mêmes tolérances.</p>
      <QuestionPager questions={projectionQuestions} />

      <div style={{
        margin: "2rem 0", padding: "1.5rem", background: `linear-gradient(135deg, ${COLORS.teal}, ${COLORS.tealLight})`,
        borderRadius: 14, color: COLORS.white, textAlign: "center"
      }}>
        <p style={{ color: COLORS.white, fontWeight: 600, margin: 0, fontSize: "1.05rem" }}>
          Si ce que vous lisez vous dérange — c'est bien. Ce malaise est votre carburant. Ne l'éteignez pas. Transformez-le.
        </p>
      </div>

      <ChecklistBox
        title="Checklist — Avant de passer à la suite"
        items={[
          "J'ai répondu aux 5 questions du miroir sur papier, honnêtement",
          "J'ai fait la projection dans 3 ans pour chacun des 6 domaines",
          "J'ai relu ce que j'ai écrit sans me protéger",
          "Je garde cette feuille — c'est mon point de départ",
        ]}
      />

      <ChapterCompletion chapterId="miroir" chapterTitle="Le Processus Miroir" />
    </div>
  );
}

function TawhidContent() {

    <VersetBox
      arabic="قُلۡ هُوَ ٱللَّهُ أَحَدٌ ۝ ٱللَّهُ ٱلصَّمَدُ ۝ لَمۡ يَلِدۡ وَلَمۡ يُولَدۡ ۝ وَلَمۡ يَكُن لَّهُۥ كُفُوًا أَحَدٌۢ"
      french="Dis : Il est Allah, l'Unique. Allah, le Seul à qui tout recourt. Il n'a pas engendré et n'a pas été engendré. Et nul ne Lui est égal."
      sourate="Sourate Al-Ikhlâs (112)"
      numero="Versets 1-4"
    />

    <VersetBox
      arabic="وَلَقَدۡ أُوحِيَ إِلَيۡكَ وَإِلَى ٱلَّذِينَ مِن قَبۡلِكَ لَئِنۡ أَشۡرَكۡتَ لَيَحۡبَطَنَّ عَمَلُكَ وَلَتَكُونَنَّ مِنَ ٱلۡخَٰسِرِينَ"
      french="Il t'a été révélé, à toi et à ceux qui t'ont précédé : si tu associes à Allah, ton œuvre sera certainement réduite à néant et tu seras assurément du nombre des perdants."
      sourate="Sourate Az-Zumar (39)"
      numero="Verset 65"
    />

    <p>Sans Tawhid, les bonnes actions n'ont pas de racine. La certitude — le <strong>yaqîn</strong> — est le carburant de toute transformation. Pas la motivation. Pas la volonté. <strong>La certitude.</strong></p>

}

    <p>L'attestation de foi (chahada), la prière cinq fois par jour, le jeûne du Ramadan, l'aumône (zakat), le pèlerinage pour ceux qui en ont la capacité. Ces cinq piliers sont des obligations — pas des suggestions. Allah ne charge pas une âme au-delà de ce qu'elle peut supporter.</p>

function PriereContent() {
  return (<>
    <p>La prière n'est pas une obligation pesante. C'est le seul moment de la journée où tu parles directement à Allah, sans intermédiaire. Le <strong>khushû'</strong> — la présence du cœur — est ce qui transforme un rituel en véritable dialogue.</p>

      arabic="الصَّلَاةُ عِمَادُ الدِّينِ، فَمَنْ أَقَامَهَا فَقَدْ أَقَامَ الدِّينَ، وَمَنْ هَدَمَهَا فَقَدْ هَدَمَ الدِّينَ"
      french="La prière est le pilier de la religion. Celui qui l'accomplit a édifié la religion. Celui qui la délaisse l'a détruite."
      source="Al-Bayhaqi, Shu'ab al-Iman — sens confirmé par de nombreux hadiths sahih"
    />
    <div className="grid-2">
      <Card title="Fajr — L'ancre du jour">Se lever avant le monde. Seul avec Allah. Ce moment programme l'énergie mentale pour toute la journée. Ce n'est pas de la discipline, c'est de l'identité.</Card>
      <Card title="Dhuhr & Asr — Le reset">En plein milieu de la journée active, tu t'arrêtes. Les pauses intentionnelles multiplient la productivité. C'est la Sunnah.</Card>
      <Card title="Maghreb & Isha — La clôture">Tu fermes la journée en état d'adoration. Tu ne te couches pas comme une bête épuisée, tu te couches comme un serviteur.</Card>
      <Card title="Anti-Waswas">Règle des 5 secondes : 5-4-3-2-1, lève-toi avant que ton cerveau décide. Les waswas de Shaytan ne résistent pas à l'action immédiate.</Card>
    </div>
    <StudyBox>
      <p style={{margin:0}}>Ibn al-Qayyim, dans <em>Al-Wabil al-Sayyib</em>, décrit le khushû' comme le cœur qui se tient debout devant Allah, libéré de tout le reste. Commencez par mémoriser la traduction de ce que vous récitez. Quand vous dites « Iyyaka na'budu wa iyyaka nasta'in », vous déclarez votre dépendance totale à Allah.</p>
    </StudyBox>

    <h4>Les prières surérogatoires : aller plus loin</h4>
    <p>Tahajjud (dernier tiers de la nuit) — la plus méritoire, développe la sincérité absolue. Witr après Isha — le Prophète ﷺ ne l'a jamais délaissée. Duha après le lever du soleil — gratitude pour le corps et l'énergie. Tawba (2 rak'at après un péché) — l'erreur est une porte vers le retour. Haja lors d'une difficulté — tawakkul en action.</p>
  </>);
}

function IntentionContent() {

      arabic="إِنَّمَا الْأَعْمَالُ بِالنِّيَّاتِ، وَإِنَّمَا لِكُلِّ امْرِئٍ مَا نَوَى"
      french="Les actes ne valent que par les intentions, et chacun n'obtient que ce qu'il a voulu."

      grade="Sahih"
    />
    <p>Posez-vous la question maintenant : pourquoi priez-vous ? Pour Allah, ou par peur du jugement des autres ? La récompense de vos actions prendra exactement la forme de vos intentions.</p>
    <p>Al-Ghazali, dans son <em>Ihya 'Ulum al-Din</em>, consacre un livre entier à la niyya. L'intention pure est ce qui distingue l'acte d'adoration de l'acte ordinaire. La même action — donner de l'argent — peut être une sadaqa ou une ostentation selon ce qui est dans le cœur.</p>
    <Tip>Imam Ahmad ibn Hanbal disait : « J'ai réfléchi à l'ensemble de la science et j'ai trouvé que tout repose sur huit hadiths. Le premier est celui de l'intention. »</Tip>
    <ActionBox title="Comment purifier vos intentions">

function DouaContent() {

    <Step num="3"><strong>Certitude :</strong> Faites votre dou'a en étant convaincu qu'Allah va répondre.</Step>

    <div className="grid-2">

function JeuneContent() {

    <p>Le jeûne est l'adoration qu'Allah a réservée pour Lui seul. C'est aussi un entraînement : quand vous jeûnez, vous prouvez à votre nafs que vous n'êtes pas gouverné par vos besoins immédiats.</p>

function MariageContent() {
  return (<>
    <p>Le mariage en islam n'est pas seulement un contrat social. C'est une <strong>adoration</strong>. Le Prophète ﷺ a dit que celui qui se marie a accompli la moitié de sa religion.</p>
    <VersetBox
      arabic="وَمِنۡ ءَايَٰتِهِۦٓ أَنۡ خَلَقَ لَكُم مِّنۡ أَنفُسِكُمۡ أَزۡوَٰجٗا لِّتَسۡكُنُوٓاْ إِلَيۡهَا وَجَعَلَ بَيۡنَكُم مَّوَدَّةٗ وَرَحۡمَةًۚ إِنَّ فِي ذَٰلِكَ لَأٓيَٰتٖ لِّقَوۡمٖ يَتَفَكَّرُونَ"
      french="Et parmi Ses signes, Il a créé pour vous, de vous-mêmes, des épouses afin que vous trouviez la quiétude auprès d'elles, et Il a mis entre vous de l'affection et de la miséricorde. Il y a là des signes pour les gens qui réfléchissent."
      sourate="Sourate Ar-Rum (30)"
      numero="Verset 21"
    />
    <HadithBox
      arabic="مَنْ تَزَوَّجَ فَقَدِ اسْتَكْمَلَ نِصْفَ الدِّينِ، فَلْيَتَّقِ اللَّهَ فِي النِّصْفِ الْبَاقِي"
      french="Celui qui se marie a accompli la moitié de la religion. Qu'il craigne Allah dans l'autre moitié."

      grade="Hasan"
    />

    <h4>Les conditions de validité</h4>
    <p>Pour qu'un mariage soit valide : le consentement des deux époux, la présence du wali (tuteur) pour la femme, le mahr (dot), et deux témoins musulmans. Ces conditions ne sont pas des formalités — elles protègent les deux parties.</p>

    <h4>Se préparer avant de chercher</h4>
    <p>Un homme ou une femme qui n'a pas fait ce travail sur lui-même apporte ses fractures dans le mariage. La partie Réparation (Partie 4) et la partie Neurosciences (Partie 5) sont des prérequis réels. On ne peut pas construire une relation stable sur une identité instable.</p>

function CorpsContent() {
  return (<>
    <p>L'adoration ne s'arrête pas au tapis de prière. Elle vit dans votre corps. Allah vous a confié un corps — pas pour l'exhiber, pas pour l'abîmer, mais pour en prendre soin comme d'un dépôt sacré.</p>
    <blockquote>« Ton corps a un droit sur toi. » — Bukhari & Muslim</blockquote>

    <h4>La Fitrah — les pratiques du corps prophétique</h4>
    <div className="grid-2">
      <Card title="Couper les ongles">Sunnah confirmée. Hygiène directe. À ne pas dépasser 40 jours.</Card>
      <Card title="Siwak">Avant chaque prière idéalement. Purifie la bouche et plaît à Allah. Équivalent de 70 prières ordinaires selon certaines narrations.</Card>
      <Card title="Enlever les poils pubiens">Partie de la Fitrah. Ne pas dépasser 40 jours. Hygiène corporelle complète.</Card>
      <Card title="Wudû fréquent">Le wudû n'est pas seulement pour la prière. Le maintenir purifie le corps et l'esprit en continu.</Card>
    </div>

    <h4>Le corps comme instrument d'adoration</h4>
    <p>Chaque membre du corps accomplit une adoration propre. Les yeux qui baissent le regard devant l'interdit. La langue qui dit la vérité. Les mains qui donnent. Les pieds qui marchent vers la mosquée. Ibn al-Qayyim dit : <em>« Le corps est le cheval de l'âme — s'il est bien nourri et bien entretenu, il porte l'âme vers Allah. S'il est abandonné, il la ralentit. »</em></p>

    <ActionBox title="Check quotidien du corps">
      <p style={{margin:0}}>Chaque matin, 3 questions : Mon corps est-il propre (wudû, hygiène) ? A-t-il mangé et dormi correctement ? A-t-il bougé aujourd'hui ? Un corps respecté rend l'adoration plus légère.</p>
    </ActionBox>
  </>);
}

function SommeilContent() {
  return (<>
    <StudyBox>
      <p style={{margin:0}}>Matthew Walker, neuroscientifique à Berkeley (<em>Why We Sleep</em>), a documenté les effets du manque de sommeil : la testostérone chute, le cortisol monte, la mémoire se dégrade, la concentration diminue, les émotions deviennent incontrôlables. Quand vous dormez mal, vous êtes chimiquement différent.</p>
    </StudyBox>
    <p>Ne dépassez pas minuit. Le sommeil avant minuit est qualitativement plus profond (phases de sommeil lent profond). Le système glymphatique — découvert en 2012 par Maiken Nedergaard — nettoie le cerveau des déchets métaboliques pendant le sommeil profond.</p>
    <h4>Protocole du sommeil prophétique</h4>
    <Step num="1"><strong>Ablution avant de dormir</strong> (Bukhari) — purifie le corps et l'esprit.</Step>
    <Step num="2"><strong>Dormir sur le côté droit</strong> (Bukhari) — favorise la digestion et la circulation cardiaque.</Step>
    <Step num="3"><strong>Secouer son lit</strong> (Bukhari) — signal au cerveau que le repos est intentionnel.</Step>
    <Step num="4"><strong>Azkar du coucher</strong> — Ayat al-Kursi + Al-Ikhlâs, Al-Falaq, An-Nâs (×3). Protection et déconnexion mentale.</Step>
    <Step num="5"><strong>Se coucher tôt</strong> — Le Prophète ﷺ détestait veiller après Isha. Fajr = ancre de toute la journée.</Step>
  </>);
}

      french="Le fils d'Adam ne remplit pas de récipient pire que son ventre. Il suffit au fils d'Adam de quelques bouchées pour redresser son dos. S'il ne peut s'en empêcher, qu'il réserve un tiers pour sa nourriture, un tiers pour sa boisson, et un tiers pour sa respiration."

function SportContent() {
  return (<>
    <HadithBox
      arabic="الْمُؤْمِنُ الْقَوِيُّ خَيْرٌ وَأَحَبُّ إِلَى اللَّهِ مِنَ الْمُؤْمِنِ الضَّعِيفِ، وَفِي كُلٍّ خَيْرٌ، احْرِصْ عَلَى مَا يَنْفَعُكَ وَاسْتَعِنْ بِاللَّهِ وَلَا تَعْجَزْ"
      french="Le croyant fort est meilleur et plus aimé d'Allah que le croyant faible, et il y a du bien dans les deux. Attache-toi à ce qui te bénéficie, demande l'aide d'Allah et ne te laisse pas aller au découragement."
      source="Sahih Muslim n°2664 — Livre du Destin"
      grade="Sahih"
    />
    <p>Le sport agit sur plusieurs niveaux simultanément. Mentalement, il libère les émotions accumulées — l'anxiété, la frustration, la tension. La discipline commence par le corps.</p>
    <StudyBox>
      <p style={{margin:0}}>L'exercice physique augmente le BDNF (Brain-Derived Neurotrophic Factor) — une protéine qui favorise la création de nouvelles connexions neuronales. Études de Ratey (Harvard, <em>Spark</em>, 2008) : 30 minutes d'exercice modéré augmentent les capacités cognitives de 20% pendant 2-3 heures. L'activité physique régulière réduit l'anxiété de 48% (méta-analyse Stubbs et al., 2017, <em>Journal of Psychiatric Research</em>).</p>
    </StudyBox>
    <h4>Programme minimum — 3x30min/semaine</h4>
    <Step num="Lun"><strong>Force :</strong> pompes, squats, tractions si possible (30-45 min). Commence à 10 pompes si besoin.</Step>
    <Step num="Mer"><strong>Endurance :</strong> marche rapide ou course légère (30 min). Rythme de conversation.</Step>
    <Step num="Ven"><strong>Marche après Jumu'ah :</strong> Sunnah de la marche dynamique. 20 min suffit.</Step>
    <p>La Salât est en soi un programme de mobilité, gainage et étirements. 5 min d'étirements au réveil chaque jour.</p>
    <h4>Médecine prophétique — récupération</h4>
    <div className="grid-2">
      <Card title="Hijama">Ventouses sèches ou humides. Améliore la circulation, soulage les douleurs chroniques. Jours recommandés : 17, 19 ou 21 du mois lunaire.</Card>
      <Card title="Hydratation Sunnah">Boire assis, en trois fois, en disant Bismillah. 2L minimum/jour. L'eau est mentionnée comme purification dans le Coran (8:11).</Card>
    </div>
  </>);
}

function HygieneContent() {
  return (<>
    <p>Ton corps est une amanah — une confiance qu'Allah t'a accordée. La Fitrah : cinq pratiques prescrites par le Prophète ﷺ, toutes confirmées par la science moderne.</p>
    <div className="grid-2">
      <Card title="Douche & propreté">Douche quotidienne. Grand bain le vendredi (Jumu'ah). Se laver soigneusement les zones intimes.</Card>
      <Card title="Peau & visage">Alimentation saine = meilleure skincare. Huile de nigelle prophétique & prouvée. 1.5L eau/jour minimum.</Card>
      <Card title="Parfum">Le Prophète ﷺ aimait le parfum. Oud, musc, ambre : fragrances prophétiques. Chercher les attars.</Card>
      <Card title="Cheveux & barbe">Coupe adaptée à la morphologie. Barbe entretenue, propre. Huile de nigelle sur le cuir chevelu.</Card>
    </div>
  </>);
}

function PenseesContent() {
  return (<>
    <p>Votre environnement est une matérialisation de vos pensées. L'overthinking — la pensée excessive et circulaire — est l'un des pièges les plus courants et les plus paralysants.</p>
    <StudyBox>
      <p style={{margin:0}}>Daniel Kahneman (<em>Thinking Fast and Slow</em>) distingue le système 1 (rapide, automatique) et le système 2 (lent, réfléchi). L'overthinking est un système 1 emballé qui tourne en boucle sans activer le système 2. Al-Ghazali avait identifié le même mécanisme au XIème siècle sous le nom de <em>hawajis</em> — les pensées parasites qui empêchent le cœur d'être présent à Allah.</p>
    </StudyBox>
    <p>Le dhikr est l'antidote. Pas comme une formule magique — comme un recentrage actif. « Ala bi dhikrillahi tatma'innu al-qulub » — c'est par le rappel d'Allah que les cœurs s'apaisent.</p>
  </>);
}

// ────── PARTIE 3 — ORIGINE COMPORTEMENTS ──────
function ComportementsSection() {
  return (
    <div className="section-content fade-in">
      <ChapterHeader number="3" title="L'Origine des Comportements" verse="L'âme est certes incitatrice au mal" verseRef="Coran 12:53" />
      <VersetBox
        arabic="وَمَآ أُبَرِّئُ نَفۡسِيٓۚ إِنَّ ٱلنَّفۡسَ لَأَمَّارَةُۢ بِٱلسُّوٓءِ إِلَّا مَا رَحِمَ رَبِّيٓۚ إِنَّ رَبِّي غَفُورٞ رَّحِيمٞ"
        french="Je ne m'absous pas moi-même, car l'âme est certes incitatrice au mal, sauf celle que protège mon Seigneur. Mon Seigneur est Certes Tout Pardonnant, Très Miséricordieux."
        sourate="Sourate Yusuf (12)"
        numero="Verset 53"
      />
      <p>Chaque comportement, chaque réaction, chaque pensée récurrente a une origine. Et cette origine se situe à l'un de ces trois niveaux :</p>

        <Card title="النفس An-Nafs — L'Âme qui ordonne le mal">
          Al-Ghazali la compare à un enfant indiscipliné qui, sans éducation spirituelle, se laisse dominer par ses instincts. Ibn Taymiyya : la purification ne vise pas à supprimer les désirs mais à les réguler selon l'agrément d'Allah. Ce que la psychologie moderne appelle les « biais cognitifs » et les « automatismes comportementaux », l'islam l'appelle depuis des siècles les inclinations de la nafs.
        </Card>
        <Card title="الهوى Al-Hawā — Le Caprice et l'impulsion">
          L'inclination du désir sans preuve ni vérité (Coran 38:26, 45:23). Ibn al-Qayyim : le hawā divise les hommes entre ceux qui suivent la vérité et ceux qui suivent leurs préférences. Al-Ghazali : son danger réside dans sa capacité à orienter progressivement vos choix jusqu'à vous aliéner de vous-même. Kahneman dirait : le système 1 non régulé qui prend le dessus.
        </Card>
        <Card title="الشيطان Shaytan — Le murmure extérieur">
          Il ne possède pas de pouvoir direct. Son action est progressive et subtile : il suggère, embellit le faux, repousse le repentir. Il ne vous force jamais. Il murmure jusqu'à ce que vous choisissiez vous-même. (Coran 35:6)

      </div>

      <div style={{
        margin: "2rem 0", padding: "1.5rem", background: COLORS.tealPale, borderRadius: 14
      }}>
        <p style={{ margin: 0, fontWeight: 600, color: COLORS.teal }}>
          La mécanique : Shaytan suggère → al-hawā désire → an-nafs exécute ou résiste.<br />

        </p>
      </div>

      <ChapterCompletion chapterId="comportements" chapterTitle="Partie 3 — L'Origine des Comportements" />
    </div>

function PontContent() {
  return (<>
    <p>Vous avez appliqué ce qu'on a vu. Et pourtant certains comportements persistent. Ce n'est pas un manque de volonté ni de foi. C'est quelque chose de plus profond.</p>
    <p>L'islam l'a identifié avant la psychologie moderne. La nafs possède des couches. En dessous vivent des blessures, des croyances, des peurs que vous n'avez jamais nommées. Elles agissent en silence.</p>
    <StudyBox>
      <p style={{margin:0}}>Al-Muhāsibī, savant musulman du IXème siècle — mille ans avant Freud — avait théorisé la <em>muhāsaba</em> dans son <em>Kitab al-Ri'aya</em> : l'examen rigoureux de soi. Les savants de l'islam pratiquaient cet examen quotidiennement, comme une adoration. On ne peut pas se purifier de ce qu'on refuse de voir.</p>
    </StudyBox>
    <p>Nous utilisons les deux approches ensemble. La psychanalyse pour nommer. La muhāsaba pour transformer. Le but : comprendre pour se libérer, nommer pour ne plus subir.</p>
  </>);
}

function QuestionnaireContent() {
  const [scores, setScores] = useState(() => {
    try { return JSON.parse(localStorage.getItem("questionnaire_scores") || "{}"); }
    catch { return {}; }
  });
  const [current, setCurrent] = useState(0);

  const handleScore = (idx, val) => {
    const next = { ...scores, [idx]: val };
    setScores(next);
    localStorage.setItem("questionnaire_scores", JSON.stringify(next));
  };

  const aff = [
    "Je ressens souvent une tension intérieure sans savoir exactement pourquoi.",
    "Quand quelqu'un me critique, même légèrement, cela m'affecte profondément et longtemps.",
    "J'ai du mal à commencer des tâches importantes même quand j'en ai le temps.",
    "Quand une relation proche est menacée, je fais tout pour éviter la rupture.",
    "Je pense que les autres vont découvrir que je ne suis pas aussi capable.",
    "Quand je suis en colère, il m'est difficile de rester calme.",
    "Quand je ne vais pas bien, je m'isole plutôt que de chercher du soutien.",
    "Même quand j'atteins un objectif, j'ai du mal à en être satisfait.",
    "Mon esprit tourne souvent en boucle sur des situations passées.",
    "Je cherche souvent l'approbation des autres avant de prendre une décision.",
    "Quand les choses commencent à bien aller, j'ai tendance à les compliquer.",
    "Je ressens un vide intérieur difficile à nommer.",
    "J'ai du mal à faire confiance aux gens.",
    "Je me réfugie dans certaines habitudes quand je ne vais pas bien.",
    "Je me sens souvent inférieur aux autres.",
  ];

  const total = aff.length;
  const f1 = [0,4,11,14].reduce((s,i) => s + (scores[i]||0), 0);
  const f2 = [2,7,10,13].reduce((s,i) => s + (scores[i]||0), 0);
  const f3 = [3,6,9,12].reduce((s,i) => s + (scores[i]||0), 0);
  const f4 = [1,5,8].reduce((s,i) => s + (scores[i]||0), 0);

  if (current === total) {
    return (
      <>
        <div style={{ margin: "1.5rem 0", padding: "1.5rem", background: COLORS.tealPale, borderRadius: 14 }}>
          <h4 style={{ color: COLORS.teal, marginBottom: "0.8rem" }}>Vos résultats</h4>
          {[
            { name: "Rapport à Soi", score: f1, max: 20 },
            { name: "Rapport à l'Action", score: f2, max: 20 },
            { name: "Rapport aux Autres", score: f3, max: 20 },
            { name: "Rapport à l'Esprit", score: f4, max: 15 },
          ].map((f, i) => {
            const pct = Math.round((f.score / f.max) * 100);
            const level = pct > 70 ? "Priorité" : pct > 40 ? "Attention" : "Peu actif";
            const col = pct > 70 ? "#C44" : pct > 40 ? COLORS.gold : COLORS.tealLight;
            return (
              <div key={i} style={{ marginBottom: "0.8rem" }}>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.9rem", marginBottom: "0.3rem" }}>
                  <span style={{ fontWeight: 600 }}>{f.name}</span>
                  <span style={{ color: col, fontWeight: 600 }}>{level} ({f.score}/{f.max})</span>
                </div>
                <div style={{ height: 6, background: "rgba(0,0,0,0.06)", borderRadius: 3 }}>
                  <div style={{ height: "100%", width: `${pct}%`, background: col, borderRadius: 3, transition: "width 0.5s" }} />
                </div>
              </div>
            );
          })}
          <p style={{ fontSize: "0.85rem", color: COLORS.gray, marginTop: "0.8rem" }}>
            Ces scores ne vous définissent pas. Ils montrent où vous en êtes en ce moment.
          </p>
        </div>
        <button className="question-pager-btn" onClick={() => setCurrent(0)}>
          Recommencer
        </button>
      </>
    );
  }

  return (
    <div className="question-pager">
      <div className="question-pager-header">
        <span className="question-pager-count">{current + 1} / {total}</span>
        <span style={{ fontSize: "0.72rem", color: COLORS.gray }}>1 = Pas du tout · 5 = Exactement moi</span>
      </div>
      <div className="question-pager-bar-track">
        <div className="question-pager-bar-fill" style={{ width: `${((current + 1) / total) * 100}%` }} />
      </div>
      <div className="question-pager-content fade-in" key={current} style={{ flexDirection: "column", gap: "1.2rem", alignItems: "stretch" }}>
        <p style={{ fontSize: "1rem", lineHeight: 1.75, color: COLORS.darkSoft, margin: 0 }}>
          {current + 1}. {aff[current]}
        </p>
        <div style={{ display: "flex", gap: "0.5rem", justifyContent: "center" }}>
          {[1,2,3,4,5].map(v => (
            <button key={v} onClick={() => handleScore(current, v)} style={{
              width: 44, height: 44, borderRadius: "50%", border: "none", cursor: "pointer",
              background: scores[current] === v ? COLORS.teal : "rgba(0,0,0,0.06)",
              color: scores[current] === v ? COLORS.white : COLORS.dark,
              fontWeight: 700, fontSize: "0.95rem", transition: "all 0.2s",
              transform: scores[current] === v ? "scale(1.12)" : "scale(1)",
            }}>{v}</button>
          ))}
        </div>
      </div>
      <div className="question-pager-nav">
        <button
          className="question-pager-btn"
          onClick={() => setCurrent(c => Math.max(0, c - 1))}
          disabled={current === 0}
        >
          Précédent
        </button>
        <button
          className="question-pager-btn primary"
          onClick={() => setCurrent(c => c + 1)}
        >
          {current === total - 1 ? "Voir mes résultats" : "Suivant"}
        </button>
      </div>
    </div>
  );
}

function Famille1Content() {
  return (<>
    <h4>1.1 — L'anxiété</h4>
    <StudyBox><p style={{margin:0}}>Aaron Beck, fondateur de la thérapie cognitive (années 70), a montré que l'anxiété est produite non par les situations, mais par l'interprétation qu'on en fait. Ibn al-Qayyim (<em>Ighathat al-Lahfan</em>) décrivait ce même mécanisme comme le cœur qui s'attache à ce qu'il ne contrôle pas au lieu de remettre l'affaire à Allah.</p></StudyBox>
    <p>Islamiquement, l'anxiété chronique est souvent le signe d'un cœur qui porte ce qu'Allah a déjà pris en charge. Le tawakkul n'est pas de la passivité. « Et quiconque place sa confiance en Allah, Il lui suffit. »</p>
    <QuestionBox>Depuis combien de temps ressentez-vous cette tension ? Y a-t-il un moment précis ?</QuestionBox>
    <QuestionBox>Si vous deviez nommer la chose que vous craignez le plus profondément, ce serait quoi ?</QuestionBox>

    <h4>1.2 — Le vide intérieur</h4>
    <StudyBox><p style={{margin:0}}>Viktor Frankl, psychiatre et survivant des camps (<em>Man's Search for Meaning</em>), a développé la logothérapie : l'être humain a besoin de sens pour vivre. Le « vide existentiel » apparaît quand la vie n'a pas de direction. L'islam répond avec une précision que la psychologie occidentale n'atteint pas : « Ala bi dhikrillahi tatma'innu al-qulub. »</p></StudyBox>

    <h4>1.3 — La faible estime de soi</h4>
    <p>La faible estime de soi n'est pas de la modestie. Elle se construit sur des années — paroles de parents, expériences d'échec, humiliations non digérées. Islamiquement : « laqad khalaqna al-insana fi ahsani taqwim » — Allah a créé l'homme dans la meilleure des formes. Vous porter du mépris est une forme d'ingratitude.</p>

    <h4>1.4 — Le syndrome de l'imposteur</h4>
    <p>La conviction que votre succès est accidentel. Il touche souvent ceux dont la valeur était conditionnelle. La vérité du croyant est au milieu : je fais de mon mieux, et c'est Allah qui donne le tawfiq.</p>
  </>);
}

function Famille2Content() {
  return (<>
    <h4>2.1 — La procrastination</h4>
    <StudyBox><p style={{margin:0}}>La procrastination n'est pas de la paresse. C'est une gestion émotionnelle. James Clear (<em>Atomic Habits</em>) : on ne procrastine pas sur ce qu'on considère comme une expression de soi-même. Piers Steel (<em>The Procrastination Equation</em>, 2007) a montré que 95% des procrastineurs veulent changer mais ne peuvent pas sans modifier leur environnement et leur identité.</p></StudyBox>
    <p>Islamiquement : « Profite de cinq choses avant cinq autres — ton temps libre avant tes occupations. »</p>

    <h4>2.2 — Le perfectionnisme paralysant</h4>
    <p>Le perfectionnisme paralysant empêche de faire. Il est souvent le fruit d'un environnement où les erreurs étaient mal tolérées. L'islam : « Chaque fils d'Adam est sujet à l'erreur, et les meilleurs sont ceux qui se repentent. »</p>

    <h4>2.3 — Le sabotage de soi</h4>
    <p>Quand vous détruisez ce qui marche. Il vient d'une croyance profonde sur ce que vous méritez. Le cerveau cherche la cohérence entre ce qu'il croit et ce qu'il vit. « Allah ne change pas l'état d'un peuple avant que celui-ci ne change ce qui est en lui-même. » Ce verset s'applique dans les deux sens.</p>

    <h4>2.4 — Les addictions comportementales</h4>
    <StudyBox><p style={{margin:0}}>Anna Lembke, psychiatre à Stanford (<em>Dopamine Nation</em>) : toute addiction comportementale répond à un besoin non satisfait. Le cerveau cherche le plaisir immédiat pour compenser une douleur qu'il ne sait pas traiter autrement. Ibn al-Qayyim décrivait le même mécanisme : le hawā en action.</p></StudyBox>
    <QuestionBox>À quelle habitude recourez-vous le plus quand vous ne vous sentez pas bien ?</QuestionBox>
    <QuestionBox>Qu'est-ce qui se passerait si vous restiez avec l'émotion inconfortable au lieu de la fuir ?</QuestionBox>
  </>);
}

function Famille3Content() {
  return (<>
    <h4>3.1 — La peur de l'abandon</h4>
    <StudyBox><p style={{margin:0}}>John Bowlby, fondateur de la théorie de l'attachement, a montré que les premières expériences relationnelles créent un modèle interne activé automatiquement dans toutes les relations adultes.</p></StudyBox>
    <p>Le seul qui ne part jamais, c'est Allah. « Wa huwa ma'akum aynamā kuntum » — Il est avec vous où que vous soyez. Construire votre sécurité intérieure sur la présence d'Allah vous libère de la dépendance qui détruit les relations.</p>

    <h4>3.2 — Le besoin de validation</h4>
    <p>C'est ce que l'islam appelle le riya — l'ostentation. Agir pour le regard des hommes plutôt que pour Allah. Le Prophète ﷺ en parlait comme du « shirk caché ».</p>

    <h4>3.3 — La difficulté à faire confiance</h4>
    <p>La méfiance chronique est épuisante. Elle finit par créer exactement ce qu'elle cherche à éviter : la solitude. L'équilibre islamique : la husnuzan (bonne opinion d'autrui) combinée au discernement.</p>

    <h4>3.4 — L'isolement</h4>
    <p>L'isolement choisi n'est pas la solitude. La solitude est une ressource. L'isolement est une fuite.</p>
    <HadithBox
      arabic="الْمُؤْمِنُ الَّذِي يُخَالِطُ النَّاسَ وَيَصْبِرُ عَلَى أَذَاهُمْ أَعْظَمُ أَجْرًا مِنَ الْمُؤْمِنِ الَّذِي لَا يُخَالِطُ النَّاسَ وَلَا يَصْبِرُ عَلَى أَذَاهُمْ"
      french="Le croyant qui se mêle aux gens et supporte leurs nuisances obtient une plus grande récompense que le croyant qui ne se mêle pas aux gens et ne supporte pas leurs nuisances."
      source="Sunan Ibn Majah n°4032 · Musnad Ahmad n°5022"
      grade="Hadith Sahih"
    />
  </>);
}

function Famille4Content() {
  return (<>
    <h4>4.1 — L'overthinking</h4>
    <p>La pensée qui tourne en boucle sans produire de solution. Al-Ghazali appelait ça les hawajis. La solution : le dhikr — pas en supprimant les pensées, mais en recentrant l'attention vers quelque chose de plus grand.</p>

    <h4>4.2 — La colère incontrôlée</h4>
    <HadithBox
      arabic="لَيْسَ الشَّدِيدُ بِالصُّرَعَةِ، إِنَّمَا الشَّدِيدُ الَّذِي يَمْلِكُ نَفْسَهُ عِنْدَ الْغَضَبِ"
      french="Le fort n'est pas celui qui terrasse les gens à la lutte. Le fort est celui qui maîtrise son âme au moment de la colère."
      source="Sahih al-Bukhari n°6114 · Sahih Muslim n°2609"
      grade="Sahih"
    />
    <p>La colère explosive est souvent le signal d'une douleur sous-jacente non exprimée. Ibn al-Qayyim : la colère mal gérée donne à Shaytan une prise directe sur le comportement.</p>

    <h4>4.3 — L'hypersensibilité émotionnelle</h4>
    <p>Ressentir les choses fort n'est pas un défaut. C'est une sensibilité qui, bien orientée, devient une force. Mais elle doit être ancrée dans quelque chose de stable.</p>
    <VersetBox
      arabic="يَٰٓأَيُّهَا ٱلَّذِينَ ءَامَنُواْ ٱسۡتَعِينُواْ بِٱلصَّبۡرِ وَٱلصَّلَوٰةِۚ إِنَّ ٱللَّهَ مَعَ ٱلصَّٰبِرِينَ"
      french="Ô vous qui croyez ! Cherchez secours dans la patience et la prière. Allah est avec les endurants."
      sourate="Sourate Al-Baqara (2)"
      numero="Verset 153"
    />

    <h4>4.4 — La rumination</h4>
    <StudyBox><p style={{margin:0}}>Al-Muhāsibī distinguait la muhāsaba — l'examen productif — de la rumination stérile. La muhāsaba a un but : identifier, se repentir, avancer. La rumination est de la douleur qui se perpétue. Nolen-Hoeksema (Stanford, 2000) a montré que la rumination prolonge les épisodes dépressifs de 4x en moyenne.</p></StudyBox>
  </>);
}

function NeurosciencesSection() {
  return (
    <div className="section-content fade-in">
      <ChapterHeader number="5" title="Neurosciences & Construction d'Identité" verse="Innallaha la yughayyiru ma biqawmin hatta yughayyiru ma bi-anfusihim" verseRef="Coran 13:11" />
      <VersetBox
        arabic="إِنَّ ٱللَّهَ لَا يُغَيِّرُ مَا بِقَوۡمٍ حَتَّىٰ يُغَيِّرُواْ مَا بِأَنفُسِهِمۡۗ وَإِذَآ أَرَادَ ٱللَّهُ بِقَوۡمٖ سُوٓءٗا فَلَا مَرَدَّ لَهُۥۚ وَمَا لَهُم مِّن دُونِهِۦ مِن وَالٍ"
        french="Allah ne change pas l'état d'un peuple tant que celui-ci ne change pas ce qui est en lui-même. Et quand Allah veut du mal à un peuple, rien ne peut le repousser. Et ils n'ont, en dehors de Lui, aucun protecteur."
        sourate="Sourate Ar-Ra'd (13)"
        numero="Verset 11"
      />

      <p>La partie réparation est derrière vous. Maintenant on construit ce qui va venir. Tu n'as pas un problème de motivation. <strong>Tu as un problème d'identité.</strong></p>

      <h3>Comment votre cerveau fabrique votre identité</h3>
      <StudyBox>
        <p style={{margin:0}}>Votre cerveau est une machine à prédire. Chaque matin, il consulte tout ce qu'il a enregistré — vos habitudes, vos réactions, vos schémas — et reconstruit qui vous êtes. Automatiquement. C'est l'identité neurologique. Norman Doidge (<em>The Brain That Changes Itself</em>) a documenté la neuroplasticité : chaque pensée, chaque comportement, chaque environnement envoie un signal qui peut redessiner l'image que le cerveau a de vous. Lisa Feldman Barrett (<em>How Emotions Are Made</em>, 2017) confirme que le cerveau ne réagit pas au monde — il le prédit, puis ajuste. Changer les prédictions, c'est changer l'identité.</p>
      </StudyBox>

      <p>Voilà pourquoi changer de comportement sans changer d'identité ne fonctionne pas. Vous pouvez vous forcer quelques semaines. Mais si l'image reste la même, le cerveau finit toujours par ramener les choses à l'état d'origine.</p>

      <h3>Le regard islamique sur le changement</h3>
      <p>Le qadar ne signifie pas que vous êtes condamné. Il signifie que tout ce qui vous est arrivé avait une raison dans la sagesse d'Allah — mais que ce que vous faites de ces expériences vous appartient. Et la tawba est un pivot. Chaque fois que vous choisissez la discipline sur le confort, la vérité sur le déni — c'est une forme de tawba.</p>

      <h3>L'isolation comme outil de reconstruction</h3>
      <p>Le Prophète ﷺ, avant la révélation, se retirait dans la grotte de Hira. Seul. En contemplation. Ce n'était pas de la fuite — c'était une préparation.</p>
      <ActionBox title="Protocole d'isolation (3 semaines minimum)">
        <p style={{margin:0}}>Passez la majorité de votre temps seul. Coupez les réseaux sociaux. Remplissez ce temps avec trois choses : la prière, la lecture du Coran, et l'écriture de vos pensées dans un journal. Le vide que vous allez ressentir au début — traversez-le. C'est là que le vrai travail commence.</p>
      </ActionBox>

      <h3>Les 4 leviers de la nouvelle identité</h3>
      <Step num="1"><strong>Décider qui vous voulez être AVANT de décider quoi faire.</strong> James Clear : les objectifs sans identité ne tiennent pas. Islamiquement : vous êtes un 'abd — un serviteur d'Allah. Construisez tout à partir de cette racine.</Step>
      <Step num="2"><strong>L'environnement avant la volonté.</strong> La volonté est une ressource limitée — elle s'épuise (études Baumeister, <em>ego depletion</em>). Concevez votre environnement pour que les bons comportements soient les plus faciles.</Step>
      <Step num="3"><strong>La preuve par l'acte.</strong> Commencez intentionnellement petit. La constance dans le petit construit ce que la grandeur intermittente ne construit pas. « Les actes les plus aimés d'Allah sont les plus réguliers, même s'ils sont peu. »</Step>
      <Step num="4"><strong>La vision incluant l'ākhira.</strong> Vous ne construisez pas seulement pour cette vie. Ce que vous devenez en dunya est le reflet de ce que vous préparez pour l'ākhira.</Step>

      <div className="grid-2">
        <Card title="L'ancienne identité">
          « Je suis quelqu'un qui ne tient pas. » « La discipline c'est pas pour moi. » « J'essaie mais j'abandonne toujours. »
        </Card>
        <Card title="La nouvelle identité islamique">
          « Je suis un serviteur d'Allah qui se lève pour Fajr. » « Mon effort est une adoration. » « Je suis en construction, et c'est suffisant. »
        </Card>
      </div>

      <StudyBox>
        <p style={{margin:0}}><strong>Protocole neuroscientifique de changement d'identité :</strong> Hebbian learning (« neurons that fire together wire together ») — la répétition intentionnelle crée de nouvelles connexions neuronales. Après 21 jours, les nouveaux circuits commencent à se stabiliser. Après 66 jours (étude Lally et al., 2010, <em>European Journal of Social Psychology</em>), le nouveau comportement devient automatique. Les 5 prières quotidiennes fournissent 5 points d'ancrage neuronaux par jour — un système de renforcement que les neurosciences valident parfaitement.</p>
      </StudyBox>

      <ChapterCompletion chapterId="neurosciences" chapterTitle="Partie 5 — Neurosciences & Identité" />
    </div>
  );
}

function HormonesContent() {
  return (<>
    <p>Votre état intérieur est en grande partie régulé par des hormones. La société moderne a appris à les manipuler — pas dans votre intérêt.</p>
    <div className="grid-2" style={{gridTemplateColumns:"1fr"}}>
      <Card title="La Dopamine — l'hormone du manque">
        <StudyBox><p style={{margin:0}}>Anna Lembke (<em>Dopamine Nation</em>, Stanford) : la dopamine n'est pas l'hormone du plaisir mais de l'anticipation du plaisir. Votre téléphone, les réseaux sociaux, la pornographie ont été conçus pour maintenir ce cycle en activation permanente. Le seuil monte. Ce qui vous procurait du plaisir avant ne suffit plus. La prière, qui exige la présence totale, devient une lutte contre votre propre cerveau qui réclame sa dose.</p></StudyBox>
      </Card>
      <Card title="Le Cortisol — l'hormone de la survie devenue chronique">
        <p>Le cortisol chronique détruit le sommeil, attaque le système immunitaire, diminue la testostérone, crée de l'inflammation. Un homme sous cortisol chronique ne peut pas construire. Il peut seulement réagir. La société moderne maintient ce cortisol élevé par stimulation anxiogène permanente.</p>
      </Card>
      <Card title="La Sérotonine — l'hormone de la paix intérieure">
        <p>Produite en grande partie dans l'intestin (90% — étude Yano et al., 2015, <em>Cell</em>). Dépend de la lumière naturelle, l'exercice physique, et la qualité des relations. La société moderne sabote ces trois conditions simultanément.</p>
      </Card>
      <Card title="L'Ocytocine — l'hormone du lien">
        <p>Libérée lors du contact physique, de la confiance, de la proximité authentique. La société des écrans a remplacé la connexion profonde par les interactions superficielles en ligne.</p>
      </Card>
    </div>
  </>);
}

function RelationsContent() {
  return (<>
    <StudyBox><p style={{margin:0}}>Eva Illouz (<em>Why Love Hurts</em>, <em>Cold Intimacies</em>) documente comment le capitalisme a transformé l'amour en marchandise. Byung-Chul Han (<em>L'Agonie d'Éros</em>) : la société de performance a éliminé l'altérité de l'amour — on consomme un miroir de ses propres désirs.</p></StudyBox>
    <p>L'islam propose quelque chose de radicalement différent. Ibn Hazm al-Andalusi décrit l'amour comme un engagement de l'être total. Le nikah repose sur la sakina — la tranquillité, l'affection et la miséricorde. Trois choses qui ne s'obtiennent que dans la durée.</p>

    <h4>Pourquoi les relations échouent vraiment</h4>
    <StudyBox><p style={{margin:0}}>John Bowlby : les premières expériences relationnelles créent un modèle interne activé automatiquement. Erich Fromm (<em>L'Art d'Aimer</em>) : la plupart des gens ne savent pas aimer parce qu'ils n'ont jamais appris que l'amour est un art.</p></StudyBox>
    <p>La sakina vient d'Allah. Le conjoint est un compagnon de route, pas un sauveur. Entrer en relation avec l'attente d'être sauvé, c'est condamner la relation à l'échec.</p>
    <h4>Les trois fondements d'une relation qui tient</h4>
    <Step num="1"><strong>La dîn, les valeurs, le caractère.</strong> Le Prophète ﷺ : « Quand quelqu'un dont vous agréez la religion et le caractère vous demande votre fille en mariage, mariez-la lui. »</Step>
    <Step num="2"><strong>La communication comme adoration.</strong> Dire la vérité à son conjoint, exprimer ses besoins avec bienveillance, réparer les torts rapidement.</Step>
    <Step num="3"><strong>La croissance commune.</strong> Grandir ensemble dans la foi, la connaissance, les projets.</Step>
  </>);
}

function PhilosophieContent() {
  return (<>
    <p>Il y a une question que la société moderne vous décourage de poser : <strong>pourquoi ?</strong> Un être humain qui se pose cette question est beaucoup moins facile à contrôler.</p>
    <StudyBox><p style={{margin:0}}>Viktor Frankl (<em>Man's Search for Meaning</em>) : l'homme peut supporter presque n'importe quelle condition s'il a un pourquoi. L'absence de sens — pas la souffrance, pas la pauvreté — est ce qui brise les êtres humains.</p></StudyBox>
    <p>L'islam a un concept précis : la <strong>tafakkur</strong>. « Afala tatafakkarun » — ne réfléchissez-vous donc pas ? Ce n'est pas une invitation polie. C'est une injonction. Les grands philosophes de l'islam — Al-Fārābī, Ibn Rushd, Ibn Khaldun — étaient des penseurs rigoureux, pas malgré leur foi, mais à cause d'elle.</p>
    <ActionBox title="Intégrer la réflexion dans le quotidien">
      <p style={{margin:0}}>15 minutes par jour à quelque chose qui vous force à réfléchir en profondeur. Trois questions régulières : Qu'est-ce que je fais de mon temps — est-ce aligné avec ce que je veux construire ? Qu'est-ce que j'ai appris cette semaine ? Est-ce que je vis selon mes valeurs, ou selon les attentes de mon environnement ?</p>
    </ActionBox>
    <blockquote>« Examinez-vous avant d'être examinés. » — Omar ibn al-Khattab</blockquote>
  </>);
}

function RechuteSection() {

      <VersetBox
        arabic="قُلۡ يَٰعِبَادِيَ ٱلَّذِينَ أَسۡرَفُواْ عَلَىٰٓ أَنفُسِهِمۡ لَا تَقۡنَطُواْ مِن رَّحۡمَةِ ٱللَّهِۚ إِنَّ ٱللَّهَ يَغۡفِرُ ٱلذُّنُوبَ جَمِيعًاۚ إِنَّهُۥ هُوَ ٱلۡغَفُورُ ٱلرَّحِيمُ"
        french="Dis : Ô Mes serviteurs qui avez commis des excès à vos propres dépens, ne désespérez pas de la miséricorde d'Allah. Allah pardonne tous les péchés. C'est Lui le Très Pardonnant, le Très Miséricordieux."
